name: Tests

on:
  push:
  pull_request:

jobs:
  static:
    name: Static checks (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu
          - fedora

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run static suite
        run: ./test.sh --mode=static --distro=${{ matrix.distro }}
